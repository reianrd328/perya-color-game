<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Multi-Server Perya Game</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <style>
        /* Dice Spinning Keyframe Animation */
       @keyframes diceSpin {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-15deg) scale(1.05); }
    50% { transform: rotate(15deg) scale(1.05); }
    75% { transform: rotate(-10deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
}

.spinning {
    animation: diceSpin 0.15s linear infinite !important;
    border: 3px dashed #ffc107 !important;
    box-shadow: 0 0 15px #ffc107 !important;
}
        
        body { background-color: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .panel { background: #222; max-width: 600px; margin: 20px auto; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        select, input, button { padding: 10px; margin: 8px; font-size: 15px; border-radius: 5px; border: none; width: 80%; max-width: 300px; box-sizing: border-box; }
        button { background: #e1b12c; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #fbc531; }
        
        .dice-container { display: flex; justify-content: center; gap: 30px; margin: 30px auto; min-height: 120px; }
        .cube { width: 80px; height: 80px; position: relative; transform-style: preserve-3d; transition: transform 2s cubic-bezier(0.2, 0.8, 0.3, 1); }
        .face { position: absolute; width: 80px; height: 80px; border: 2px solid #000; border-radius: 12px; opacity: 0.95; }
        
        .red { background: #ff2a2a; transform: rotateY(0deg) translateZ(40px); }
        .blue { background: #2a75ff; transform: rotateY(90deg) translateZ(40px); }
        .green { background: #2aff53; transform: rotateY(180deg) translateZ(40px); }
        .yellow { background: #ffeb2a; transform: rotateY(-90deg) translateZ(40px); }
        .white { background: #ffffff; transform: rotateX(90deg) translateZ(40px); }
        .pink { background: #ff2ae2; transform: rotateX(-90deg) translateZ(40px); }

        .rolling { animation: tumble 0.4s infinite linear; }
        @keyframes tumble {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .hidden { display: none !important; }
        hr { border: 0; height: 1px; background: #444; margin: 20px 0; }
        #request-list div { background: #333; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        #request-list button { width: auto; padding: 5px 10px; margin: 0; font-size: 12px; background: #4cd137; color: white; }
    </style>
</head>
<body>

    <h1>🎰 Live Perya Multi-Server Engine 🎰</h1>

    <div id="login-panel" class="panel">
        <h3>Choose Your Server Room Group</h3>
        <select id="room_id">
            <option value="Server_1">Sub-Server Admin #1 Group</option>
            <option value="Server_2">Sub-Server Admin #2 Group</option>
            <option value="Server_3">Sub-Server Admin #3 Group</option>
            <option value="Server_4">Sub-Server Admin #4 Group</option>
            <option value="Server_5">Sub-Server Admin #5 Group</option>
        </select><br>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button id="btn-login" onclick="connectToServer()">Login to Selected Table</button>
    </div>

    <div id="game-board" class="panel hidden">
        <h2 id="display-room" style="color: #e1b12c;">Connected Room: </h2>
        <h3 id="display-user">Player: ---</h3>
        <hr>
        
        <div class="dice-container">
            <div class="cube" id="dice1">
                <div class="face red"></div><div class="face blue"></div><div class="face green"></div>
                <div class="face yellow"></div><div class="face white"></div><div class="face pink"></div>
            </div>
            <div class="cube" id="dice2">
                <div class="face red"></div><div class="face blue"></div><div class="face green"></div>
                <div class="face yellow"></div><div class="face white"></div><div class="face pink"></div>
            </div>
            <div class="cube" id="dice3">
                <div class="face red"></div><div class="face blue"></div><div class="face green"></div>
                <div class="face yellow"></div><div class="face white"></div><div class="face pink"></div>
            </div>
        </div>
        <hr>

        <button id="btn-request-pull" onclick="requestPull()">🙋‍♂️ Request to Pull Rope</button>
        <button id="btn-pull-rope" class="hidden" style="background:#4cd137; color: #fff;" onclick="triggerRoll()">🔔 PULL THE ROPE NOW</button>
    </div>

    <div id="admin-panel" class="panel hidden" style="border: 2px solid #e1b12c;">
        <h2 style="color: #e1b12c;">🛠️ Room Manager Control Deck</h2>
        <p>Use this area to create accounts for players and authorize rope pull requests.</p>
        <hr>
        
        <div id="pull-requests-tray">
            <h3>Rope Pull Permission Requests:</h3>
            <div id="request-list">No pending requests.</div>
        </div>
        <hr>
        
        <h3>Add User to Your Server Group:</h3>
        <input type="text" id="new-user" placeholder="New Player Username"><br>
        <button style="background: #4cd137; color: #fff;" onclick="createUser()">Add Player Profile</button>
        <p id="creation-log" style="color:#4cd137; font-weight: bold;"></p>
    </div>

    <script>
        // Check if Socket.IO successfully attached to the window instance
        if (typeof io === 'undefined') {
            alert("⚠️ CDN Network Blocked. Falling back to local socket routing definitions.");
            document.write('<script src="/static/socket.io.js"><\/script>');
        }

       // Establish Socket.IO connection
const socket = io();

// Tracking variables for the client
let currentUsername = "";
let currentRoomId = "Server_1"; 
let isAdmin = false;

// Elements
const loginForm = document.getElementById('loginForm');
const gameBoard = document.getElementById('gameBoard');
const adminPanel = document.getElementById('adminPanel');
const pullRopeButton = document.getElementById('pullRopeButton');
const addPlayerButton = document.getElementById('addPlayerButton');
const usernameInput = document.getElementById('usernameInput');

// ==========================================
// 1. DICE ANIMATION & ROLL BUTTON HANDLING
// ==========================================

// Call this function when a roll/pull sequence begins
function triggerDiceRollAnimation() {
    // DO NOT HIDE THE BUTTON. Disable it and make it transparent instead.
    if (pullRopeButton) {
        pullRopeButton.disabled = true;
        pullRopeButton.style.opacity = "0.6";
        pullRopeButton.innerText = "⏳ Rolling Dice...";
    }

    // Add the CSS spinning animation class to all three dice boxes
    const diceBoxes = document.querySelectorAll('.dice-box');
    diceBoxes.forEach(box => {
        box.classList.add('spinning');
    });
}

// Call this function when the backend responds with final results
function stopDiceRollAnimation() {
    // Remove the CSS spinning class from all dice boxes
    const diceBoxes = document.querySelectorAll('.dice-box');
    diceBoxes.forEach(box => {
        box.classList.remove('spinning');
    });

    // Restore the Pull button state completely
    if (pullRopeButton) {
        pullRopeButton.disabled = false;
        pullRopeButton.style.opacity = "1";
        pullRopeButton.innerText = "🔗 PULL THE ROPE";
    }
}

// ==========================================
// 2. SOCKET.IO OUTBOUND EMITTERS
// ==========================================

// Handle Login submission
function submitLogin() {
    const userField = document.getElementById('loginUsername').value.trim();
    const passField = document.getElementById('loginPassword').value;
    const roomSelect = document.getElementById('serverRoomSelect');
    
    if (roomSelect) {
        currentRoomId = roomSelect.value;
    }

    if (!userField || !passField) {
        alert("Please enter both username and password.");
        return;
    }

    socket.emit('join_game', {
        username: userField,
        password: passField,
        room_id: currentRoomId
    });
}

// Handle Admin adding a player profile
if (addPlayerButton) {
    addPlayerButton.addEventListener('click', function() {
        const newPlayerName = document.getElementById('newPlayerUsername').value.trim();
        if (!newPlayerName) {
            alert("Please type a username first.");
            return;
        }

        // Emit to server along with the current server room scope context
        socket.emit('create_player', {
            username: newPlayerName,
            coins: 1000,
            room_id: currentRoomId
        });
    });
}

// Handle manual trigger click for pulling the rope
if (pullRopeButton) {
    pullRopeButton.addEventListener('click', function() {
        triggerDiceRollAnimation(); // Instantly spin frontend boxes
        socket.emit('request_pull');
    });
}

// ==========================================
// 3. SOCKET.IO INBOUND LISTENERS
// ==========================================

// User status response after trying to log in
socket.on('user_status', function(data) {
    currentUsername = data.username;
    isAdmin = data.is_admin;
    currentRoomId = data.room_id;

    // Hide login layer, reveal operational dashboard frames
    if (loginForm) loginForm.style.display = 'none';
    
    if (isAdmin) {
        if (adminPanel) adminPanel.style.display = 'block';
        if (gameBoard) gameBoard.style.display = 'none';
        document.getElementById('connectedRoomTitle').innerText = "Connected Room: " + currentRoomId.replace('_', ' ');
    } else {
        if (adminPanel) adminPanel.style.display = 'none';
        if (gameBoard) gameBoard.style.display = 'block';
        document.getElementById('playerBalanceDisplay').innerText = data.coins + " Coins";
    }
});

// Capture failure triggers on connection attempts
socket.on('login_failed', function(data) {
    alert(data.message);
});

// Capture backend admin-specific notification alerts
socket.on('admin_error', function(data) {
    alert("Database Error: " + data.message);
});

// Catch validation details when a user profile is saved successfully
socket.on('player_created', function(data) {
    alert(`🎉 Success!\nCreated profile: ${data.username}\nPass: ${data.password}`);
    document.getElementById('newPlayerUsername').value = ""; // Clear input field
});

// Real-time synchronization payload sent down by Python update_admin_panels engine
socket.on('admin_dashboard_update', function
    </script>
</body>
</html>
