<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Multi-Server Perya Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.0.1/socketio.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; }
        .server-tray { margin: 15px; padding: 10px; background: #2b2b2b; border-radius: 8px; }
        select, input, button { padding: 8px; margin: 5px; font-size: 14px; border-radius: 4px; border: none; }
        button { background: #e1b12c; color: #000; font-weight: bold; cursor: pointer; }
        
        /* 🎲 3D DICE ANIMATION STYLES */
        .dice-container { display: flex; justify-content: center; gap: 40px; margin: 30px auto; min-height: 120px; }
        .cube { width: 80px; height: 80px; position: relative; transform-style: preserve-3d; transition: transform 3s cubic-bezier(0.2, 0.8, 0.3, 1); }
        .face { position: absolute; width: 80px; height: 80px; border: 2px solid #000; border-radius: 10px; opacity: 0.9; }
        
        /* Color Alignments for the faces */
        .red { background: #ff2a2a; transform: rotateY(0deg) translateZ(40px); }
        .blue { background: #2a75ff; transform: rotateY(90deg) translateZ(40px); }
        .green { background: #2aff53; transform: rotateY(180deg) translateZ(40px); }
        .yellow { background: #ffeb2a; transform: rotateY(-90deg) translateZ(40px); }
        .white { background: #ffffff; transform: rotateX(90deg) translateZ(40px); }
        .pink { background: #ff2ae2; transform: rotateX(-90deg) translateZ(40px); }

        /* Animation classes triggering tumbling */
        .rolling { animation: tumble 0.5s infinite linear; }
        @keyframes tumble {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .hidden { display: none; }
        .panel { background: #222; max-width: 600px; margin: 20px auto; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>🎰 Live Perya Multi-Server Engine 🎰</h1>

    <div id="login-panel" class="panel">
        <h3>Choose Your Server Room Group</h3>
        <select id="room_id">
            <option value="Server_1">Sub-Server Admin #1 Group</option>
            <option value="Server_2">Sub-Server Admin #2 Group</option>
            <option value="Server_3">Sub-Server Admin #3 Group</option>
            <option value="Server_4">Sub-Server Admin #4 Group</option>
            <option value="Server_5">Sub-Server Admin #5 Group</option>
            <option value="Server_6">Sub-Server Admin #6 Group</option>
            <option value="Server_7">Sub-Server Admin #7 Group</option>
            <option value="Server_8">Sub-Server Admin #8 Group</option>
            <option value="Server_9">Sub-Server Admin #9 Group</option>
            <option value="Server_10">Sub-Server Admin #10 Group</option>
        </select><br>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="connectToServer()">Login to Selected Table</button>
    </div>

    <div id="game-board" class="hidden">
        <h2 id="display-room">Connected Room: </h2>
        <h3 id="display-user">Player: </h3>
        
        <div class="dice-container">
            <div class="cube" id="dice1">
                <div class="face red"></div><div class="face blue"></div><div class="face green"></div>
                <div class="face yellow"></div><div class="face white"></div><div class="face pink"></div>
            </div>
            <div class="cube" id="dice2">
                <div class="face red"></div><div class="face blue"></div><div class="face green"></div>
                <div class="face yellow"></div><div class="face white"></div><div class="face pink"></div>
            </div>
            <div class="cube" id="dice3">
                <div class="face red"></div><div class="face blue"></div><div class="face green"></div>
                <div class="face yellow"></div><div class="face white"></div><div class="face pink"></div>
            </div>
        </div>

        <button id="btn-request-pull" onclick="requestPull()">🙋‍♂️ Request to Pull Rope</button>
        <button id="btn-pull-rope" class="hidden" style="background:#4cd137;" onclick="triggerRoll()">🔔 PULL THE ROPE NOW</button>
    </div>

    <div id="admin-panel" class="panel hidden">
        <h2>🛠️ Room Manager Control Deck</h2>
        <div id="pull-requests-tray">
            <h3>Rope Pull Permission Requests:</h3>
            <div id="request-list">No pending requests.</div>
        </div>
        <hr>
        <h3>Add User to Your Server Group:</h3>
        <input type="text" id="new-user" placeholder="New Player Username">
        <button onclick="createUser()">Add Player Profile</button>
        <p id="creation-log" style="color:#4cd137;"></p>
    </div>

    <script>
        const socket = io();
        let myUsername = "";
        let targetRotationMap = { 'red': 'rotateY(0deg)', 'blue': 'rotateY(-90deg)', 'green': 'rotateY(-180deg)', 'yellow': 'rotateY(90deg)', 'white': 'rotateX(-90deg)', 'pink': 'rotateX(90deg)' };

        function connectToServer() {
            myUsername = document.getElementById('username').value;
            socket.emit('join_game', {
                username: myUsername,
                password: document.getElementById('password').value,
                room_id: document.getElementById('room_id').value
            });
        }

        socket.on('user_status', function(data) {
            document.getElementById('login-panel').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            document.getElementById('display-room').innerText = "Connected Room Server: " + data.room_id;
            document.getElementById('display-user').innerText = "Account: " + data.username + " | 💰 " + data.coins + " Coins";
            
            if(data.is_admin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('btn-request-pull').classList.add('hidden');
                document.getElementById('btn-pull-rope').classList.remove('hidden'); // Admins can always roll
            }
        });

        function requestPull() {
            socket.emit('request_pull', {});
        }

        socket.on('pull_requested_status', data => alert(data.message));
        
        socket.on('pull_permission_granted', function() {
            alert("🎉 The Admin has approved your request! You have access to pull the rope once.");
            document.getElementById('btn-request-pull').classList.add('hidden');
            document.getElementById('btn-pull-rope').classList.remove('hidden');
        });

        function triggerRoll() {
            socket.emit('trigger_roll', {});
            document.getElementById('btn-pull-rope').classList.add('hidden');
            if(document.getElementById('admin-panel').classList.contains('hidden')) {
                document.getElementById('btn-request-pull').classList.remove('hidden');
            }
        }

        socket.on('dice_rolling', function() {
            // Apply infinite tumble CSS classes instantly to initiate spin loop animation
            document.getElementById('dice1').className = "cube rolling";
            document.getElementById('dice2').className = "cube rolling";
            document.getElementById('dice3').className = "cube rolling";
        });

        socket.on('roll_results', function(data) {
            // Stop the spinning motion loop
            document.getElementById('dice1').className = "cube";
            document.getElementById('dice2').className = "cube";
            document.getElementById('dice3').className = "cube";
            
            // Apply 3D matrix transforms to land exactly on the correct side color
            setTimeout(() => {
                document.getElementById('dice1').style.transform = targetRotationMap[data.dice[0]];
                document.getElementById('dice2').style.transform = targetRotationMap[data.dice[1]];
                document.getElementById('dice3').style.transform = targetRotationMap[data.dice[2]];
            }, 50);

            setTimeout(() => { alert("Dice result: " + data.dice.join(" | ")); }, 1000);
        });

        socket.on('admin_dashboard_update', function(data) {
            if(data.pull_requests) {
                let listHtml = "";
                data.pull_requests.forEach(user => {
                    listHtml += `<div style="margin:5px;">👤 ${user} <button onclick="grantPermission('${user}')">Approve Pull</button></div>`;
                });
                document.getElementById('request-list').innerHTML = listHtml || "No pending requests.";
            }
        });

        function grantPermission(user) {
            socket.emit('grant_pull_permission', { username: user });
        }

        function createUser() {
            socket.emit('create_player', { username: document.getElementById('new-user').value, coins: 5000, is_admin: false });
        }

        socket.on('player_created', function(data) {
            document.getElementById('creation-log').innerText = `Created Player Profile -> User: ${data.username} | Temporary Pass: ${data.password}`;
        });
        
        socket.on('login_failed', data => alert(data.message));
    </script>
</body>
</html>
